/**
 * HaloITSM notification commands, templates, and user
 */

// ─── Notification Commands ────────────────────────────────────────────────────

object NotificationCommand "HaloNotification Host jitter halo fix" {
  command = [ "/opt/icinga-scripts/notify-host-halo.sh" ]
  arguments = {
    "-H" = "$host.name$"
    "-l" = "$host.state$"
    "-m" = "$host.output$"
    "-t" = "$notification.type$"
  }
}

object NotificationCommand "HaloNotification Service jitter halo fix" {
  command = [ "/opt/icinga-scripts/notify-service-halo.sh" ]
  arguments = {
    "-H" = "$host.name$"
    "-t" = "$notification.type$"
    "-v" = "$service.name$"
    "-w" = "$service.state$"
    "-x" = "$service.output$"
  }
}

// ─── User ─────────────────────────────────────────────────────────────────────

object User "halo-digital-user" {
  import "generic-user"
  display_name    = "HaloITSM Digital"
  enable_notifications = true
  states = [ Critical, Down, OK, Up, Warning ]
  types  = [ Acknowledgement, Custom, FlappingEnd, FlappingStart, Problem, Recovery ]
}

// ─── Notification Templates ───────────────────────────────────────────────────

template Notification "Halo-Notification-Host" {
  command = "HaloNotification Host jitter halo fix"
}

template Notification "Halo-Notification-Service" {
  command = "HaloNotification Service jitter halo fix"
}
