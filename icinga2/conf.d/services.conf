/**
 * services.conf - Apply service checks to hosts
 */

// Ping
apply Service "ping4" {
  import "generic-service"
  check_command = "ping4"
  assign where host.address
}

apply Service "ping6" {
  import "generic-service"
  check_command = "ping6"
  assign where host.address6
}

// SSH
apply Service "ssh" {
  import "generic-service"
  check_command = "ssh"
  assign where (host.address || host.address6) && host.vars.os == "Linux"
}

// HTTP vhosts
apply Service for (http_vhost => config in host.vars.http_vhosts) {
  import "generic-service"
  check_command = "http"
  vars += config
}

// Disk checks
apply Service for (disk => config in host.vars.disks) {
  import "generic-service"
  check_command = "disk"
  vars += config
}

// ICMP
apply Service "icmp" {
  import "generic-service"
  check_command = "icmp"
  assign where host.address
}

// Load average
apply Service "load" {
  import "generic-service"
  check_command = "load"
  assign where host.vars.os == "Linux"
}

// Procs
apply Service "procs" {
  import "generic-service"
  check_command = "procs"
  assign where host.vars.os == "Linux"
}

// Swap
apply Service "swap" {
  import "generic-service"
  check_command = "swap"
  assign where host.vars.os == "Linux"
}

// Users
apply Service "users" {
  import "generic-service"
  check_command = "users"
  assign where host.vars.os == "Linux"
}

// HTTPS certificate expiry — warns at 30 days, critical at 14 days
apply Service "HTTPS Certificate" {
  import "generic-service"

  check_command  = "http"
  check_interval = 12h
  retry_interval = 1h

  vars.http_ssl         = true
  vars.http_certificate = "14,30"
  vars.http_address     = host.address

  assign where host.vars.master == true
}

// BSP-poll passive service — results submitted by bsp-poll cron job
apply Service "BSP-poll" {
  import "generic-service"

  check_command         = "dummy"
  enable_active_checks  = false
  enable_passive_checks = true

  assign where "linux-player" in host.templates
}
