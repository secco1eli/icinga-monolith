/**
 * services.conf - Apply service checks to hosts
 */

// Ping
apply Service "ping4" {
  import "generic-service"
  check_command = "ping4"
  assign where host.address
}

apply Service "ping6" {
  import "generic-service"
  check_command = "ping6"
  assign where host.address6
}

// SSH
apply Service "ssh" {
  import "generic-service"
  check_command = "ssh"
  assign where (host.address || host.address6) && host.vars.os == "Linux"
}

// HTTP vhosts
apply Service for (http_vhost => config in host.vars.http_vhosts) {
  import "generic-service"
  check_command = "http"
  vars += config
}

// Disk checks
apply Service for (disk => config in host.vars.disks) {
  import "generic-service"
  check_command = "disk"
  vars += config
}

// ICMP
apply Service "icmp" {
  import "generic-service"
  check_command = "icmp"
  assign where host.address
}

// Load average
apply Service "load" {
  import "generic-service"
  check_command = "load"
  assign where host.vars.os == "Linux"
}

// Procs
apply Service "procs" {
  import "generic-service"
  check_command = "procs"
  assign where host.vars.os == "Linux"
}

// Swap
apply Service "swap" {
  import "generic-service"
  check_command = "swap"
  assign where host.vars.os == "Linux"
}

// Users
apply Service "users" {
  import "generic-service"
  check_command = "users"
  assign where host.vars.os == "Linux"
}

// QuestDB host import monitor — passive check submitted by import-hosts-questdb.sh
// Service stays at last known state; CRITICAL is submitted by the script on failure.
apply Service "QuestDB Host Import" {
  import "generic-service"

  check_command         = "dummy"
  enable_active_checks  = false
  enable_passive_checks = true

  vars.dummy_state = 3
  vars.dummy_text  = "UNKNOWN: no result received yet from host import script"

  assign where host.vars.icinga_master
}

// BSP-poll passive service — results submitted by bsp-poll cron job
apply Service "BSP-poll" {
  import "generic-service"

  check_command         = "dummy"
  enable_active_checks  = false
  enable_passive_checks = true

  assign where "linux-player" in host.templates
}

// BSP-poll heartbeat — submitted by run-bsp-poll.sh after each cron run
// Active dummy fires CRITICAL if no passive result resets the timer within check_interval
apply Service "BSP-poll Last Run" {
  import "generic-service"

  check_command         = "dummy"
  enable_active_checks  = true
  enable_passive_checks = true
  check_interval        = 10m
  retry_interval        = 10m

  vars.dummy_state = 2
  vars.dummy_text  = "CRITICAL: no heartbeat received from bsp-poll in 10 minutes"

  assign where host.vars.icinga_master
}
