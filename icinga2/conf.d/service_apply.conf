/**
 * service_apply.conf - Custom service apply rules
 *
 * Use standard Icinga2 apply rules here (no Director required).
 *
 * Examples:
 *
 *   // Apply a service to all hosts matching a name pattern
 *   apply Service "My Custom Check" {
 *     import "generic-service"
 *     check_command = "dummy"
 *     enable_active_checks  = false
 *     enable_passive_checks = true
 *     assign where match("UK-RO-STM-P*", host.name)
 *   }
 *
 *   // Apply based on a host variable
 *   apply Service "Another Check" {
 *     import "generic-service"
 *     check_command = "dummy"
 *     assign where host.vars.location == "London"
 *   }
 */
