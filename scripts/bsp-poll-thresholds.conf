# Per-host BSP-poll stale thresholds
#
# Format:   hostname_or_pattern = minutes
#
# Glob patterns are supported:
#   *   matches any sequence of characters (not including /)
#   ?   matches any single character
#   [abc] matches any character in the set
#
# Rules are evaluated top-to-bottom; the FIRST match wins.
# Put more specific patterns BEFORE broader wildcards.
#
# Hosts not matched by any rule use the global default
# (STALE_THRESHOLD_SECONDS env var, default 15 minutes).
#
# Changes take effect on the next cron run — no restart needed.
#
# Examples:
#   UK-RO-WS1-P* = 30
#   UK-RO-WS1-P001 = 60
#   batch-server-* = 120
#   realtime-feed-* = 5
